<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Thinking Lab</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            border: none;
            border-radius: 16px;
        }
        .student-block {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 15px;
        }
        .student-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: #4a5568;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="container my-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-9 col-lg-6">
            
            <div class="card shadow">
                <div class="card-body p-4 p-sm-5">
                    
                    <!-- Header Section -->
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-dark mb-1">Design Thinking Lab</h2>
                        <p class="text-muted small">Project Team Registration (5 Students)</p>
                    </div>

                    <form id="teamForm" class="needs-validation" novalidate>
                        
                        <!-- Students Section -->
                        <div class="mb-4 d-flex flex-column gap-3">
                            <label class="form-label fw-bold text-secondary mb-1">Team Members Details</label>
                            
                            <!-- Student 1 -->
                            <div class="student-block">
                                <div class="student-title"><i class="bi bi-person-fill text-danger"></i> Student 1</div>
                                <div class="row g-2">
                                    <div class="col-12 col-sm-6">
                                        <input type="text" name="roll1" class="form-control" pattern="^[a-zA-Z0-9]{12,12}$" inputmode="numeric" placeholder="Roll No 1 " required>
                                    </div>
                                    <div class="col-12 col-sm-6">
                                        <input type="text" name="name1" class="form-control" placeholder="Student Name 1" required>
                                    </div>
                                </div>
                            </div>

                            <!-- Student 2 -->
                            <div class="student-block">
                                <div class="student-title"><i class="bi bi-person-fill text-danger"></i> Student 2</div>
                                <div class="row g-2">
                                    <div class="col-12 col-sm-6">
                                        <input type="text" name="roll2" class="form-control" pattern="^[a-zA-Z0-9]{12,12}$" inputmode="numeric" placeholder="Roll No 2" required>
                                    </div>
                                    <div class="col-12 col-sm-6">
                                        <input type="text" name="name2" class="form-control" placeholder="Student Name 2" required>
                                    </div>
                                </div>
                            </div>

                            <!-- Student 3 -->
                            <div class="student-block">
                                <div class="student-title"><i class="bi bi-person-fill text-danger"></i> Student 3</div>
                                <div class="row g-2">
                                    <div class="col-12 col-sm-6">
                                        <input type="text" name="roll3" class="form-control" pattern="^[a-zA-Z0-9]{12,12}$" inputmode="numeric" placeholder="Roll No 3" required>
                                    </div>
                                    <div class="col-12 col-sm-6">
                                        <input type="text" name="name3" class="form-control" placeholder="Student Name 3" required>
                                    </div>
                                </div>
                            </div>

                            <!-- Student 4 -->
                            <div class="student-block">
                                <div class="student-title"><i class="bi bi-person-fill text-danger"></i> Student 4</div>
                                <div class="row g-2">
                                    <div class="col-12 col-sm-6">
                                        <input type="text" name="roll4" class="form-control" pattern="^[a-zA-Z0-9]{12,12}$" inputmode="numeric" placeholder="Roll No 4" required>
                                    </div>
                                    <div class="col-12 col-sm-6">
                                        <input type="text" name="name4" class="form-control" placeholder="Student Name 4" required>
                                    </div>
                                </div>
                            </div>

                            <!-- Student 5 -->
                            <div class="student-block">
                                <div class="student-title"><i class="bi bi-person-fill text-danger"></i> Student 5</div>
                                <div class="row g-2">
                                    <div class="col-12 col-sm-6">
                                        <input type="text" name="roll5" class="form-control" pattern="^[a-zA-Z0-9]{12,12}$" inputmode="numeric" placeholder="Roll No 5" required>
                                    </div>
                                    <div class="col-12 col-sm-6">
                                        <input type="text" name="name5" class="form-control" placeholder="Student Name 5" required>
                                    </div>
                                </div>
                            </div>

                        </div>

                        <!-- Project Title Section -->
                        <div class="mb-4">
                            <label for="projectTitle" class="form-label fw-bold text-secondary">Project Title</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-lightbulb"></i></span>
                                <input type="text" id="projectTitle" name="projectTitle" class="form-control" placeholder="Enter your project title" required>
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <button type="submit" id="submitBtn" class="btn btn-success w-100 py-3 fw-bold shadow-sm">
                            Submit Team Details
                        </button>
                    </form>

                    <!-- Alert Message Box -->
                    <div id="message" class="alert d-none mt-3 text-center fw-semibold" role="alert"></div>

                </div>
            </div>

        </div>
    </div>
</div>

<script>
    // PASTE YOUR DEPLOYED GOOGLE WEB APP URL HERE
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyUUYcAFC2ub6YgFyqwKD9HgcQZQ1tfz4LEPwnYpCE6oNaivWgYvrY1ERSXFnICtW-rcw/exec';
    const form = document.getElementById('teamForm');
    const submitBtn = document.getElementById('submitBtn');
    const messageDiv = document.getElementById('message');

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        if (!form.checkValidity()) {
            e.stopPropagation();
            form.classList.add('was-validated');
            return;
        }

        // Collect and check for duplicate roll entries within the team
        const rolls = [
            form.roll1.value.trim().toUpperCase(), 
            form.roll2.value.trim().toUpperCase(), 
            form.roll3.value.trim().toUpperCase(), 
            form.roll4.value.trim().toUpperCase(), 
            form.roll5.value.trim().toUpperCase()
        ];
        
        const uniqueRolls = new Set(rolls);
        if(uniqueRolls.size !== rolls.length) {
            showMessage("Submission Failed: Duplicate roll numbers detected in this team.", "alert-danger");
            return;
        }

        submitBtn.disabled = true;
        showMessage("Saving team details... please wait.", "alert-info");

        // Send data directly to the Google Sheet backend
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                showMessage("Success! All team records saved to Google Sheets.", "alert-success");
                form.reset();
                form.classList.remove('was-validated');
                submitBtn.disabled = false;
            })
            .catch(error => {
                showMessage("Network Error! Submission failed. Please try again.", "alert-danger");
                submitBtn.disabled = false;
                console.error('Error!', error.message);
            });
    });

    function showMessage(text, alertClass) {
        messageDiv.className = `alert mt-3 text-center fw-semibold ${alertClass}`;
        messageDiv.textContent = text;
        messageDiv.classList.remove('d-none');
    }
</script>

</body>
</html>
